name: deploy
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/*.toml"
      - "web/**"
      - "src/**"
      - "wrangler.jsonc"
      - "package.json"
      - "aube-lock.yaml"
      - ".config/aube/config.toml"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4

      - name: Install dependencies
        run: aube ci

      - name: Build web frontend
        run: aube --dir web run build

      - name: Deploy to Cloudflare Workers
        run: |
          for attempt in 1 2 3; do
            if aube exec wrangler deploy; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Cloudflare deployment failed after $attempt attempts"
              exit 1
            fi

            delay=$((attempt * 15))
            echo "::warning::Cloudflare deployment attempt $attempt failed; retrying in ${delay}s"
            sleep "$delay"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run database migrations
        run: node scripts/migrate.js run
        env:
          TOKEN_MANAGER_URL: https://mise-tools.jdx.dev
          TOKEN_MANAGER_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
