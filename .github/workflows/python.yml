name: python-precompiled
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

concurrency:
  group: python-precompiled
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GITHUB_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
  DRY_RUN: 0

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
      - run: npm install
      - run: ./scripts/python.sh
      - name: Upload .gz files to R2
        run: ./scripts/upload-gz.sh
        env:
          API_URL: https://mise-versions.jdx.dev
          API_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
