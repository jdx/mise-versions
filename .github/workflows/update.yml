name: update
on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Force full sync of all versions to D1"
        required: false
        default: "false"
        type: boolean
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: update
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GITHUB_API_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
  TOKEN_MANAGER_URL: https://mise-tools.jdx.dev
  TOKEN_MANAGER_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
  DRY_RUN: 0
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - run: curl https://mise.run | MISE_INSTALL_PATH="$HOME/.local/share/mise/bin/mise" sh && mise --version
      - run: npm install
      - name: Cache last processed tool
        id: cache-last-tool
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: last_processed_tool.txt
          key: last-processed-tool-${{ github.run_id }}
          restore-keys: |
            last-processed-tool-
      - run: ./scripts/update.sh "${{ github.event.schedule }}"
      - run: git checkout docs && git clean -df docs
      - name: Sync tools to D1
        run: node scripts/sync-to-d1.js
        env:
          SYNC_API_URL: https://mise-tools.jdx.dev
          API_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
      - name: Sync versions to D1
        run: node scripts/sync-versions-to-d1.js
        env:
          SYNC_API_URL: https://mise-tools.jdx.dev
          API_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
          FULL_SYNC: ${{ inputs.full_sync || 'false' }}
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
