name: metadata
on:
  workflow_dispatch:
  schedule:
    # Run every Sunday at 3:47 AM UTC
    - cron: "47 3 * * 0"

concurrency:
  group: metadata
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}

jobs:
  fetch-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"

      - run: npm install

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Fetch and sync tool metadata
        run: node scripts/fetch-metadata.js
        env:
          SYNC_API_URL: https://mise-tools.jdx.dev
          GITHUB_PROXY_URL: https://mise-tools.jdx.dev
          API_SECRET: ${{ secrets.TOKEN_MANAGER_SECRET }}
