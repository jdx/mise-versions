name: test
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4
      - run: aube ci
      - run: aube --dir web run build
      - run: aube run test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4
      - run: aube ci
      - run: mise run types:check
      - run: hk check
